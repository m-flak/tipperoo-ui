<app-top-bar></app-top-bar>
<router-outlet />
@let connected = connected$ | async;
@if (connected) {
    <div class="accordion-holder">
        <div ngbAccordion>
            <div ngbAccordionItem [collapsed]="false">
                <h2 ngbAccordionHeader>
                    <button ngbAccordionButton>Receive Tips</button>
                </h2>
                <div ngbAccordionCollapse>
                    <div ngbAccordionBody>
                        <app-receive-tips></app-receive-tips>
                    </div>
                </div>
            </div>
            <div ngbAccordionItem>
                <h2 ngbAccordionHeader>
                    <button ngbAccordionButton>Send Tips</button>
                </h2>
                <div ngbAccordionCollapse>
                    <div ngbAccordionBody>
                        <app-send-tips></app-send-tips>
                    </div>
                </div>
            </div>
        </div>
    </div>
}
