<a>
    @if (chainId.toUpperCase() === "0x8274F") {
        <img src="/icons/scroll-sepolia.png" width="24" height="24" alt="Scroll Sepolia" title="Scroll Sepolia" />
    }
    @else if (chainId === "0x82750") {
        <img src="/icons/scroll.svg" width="24" height="24" alt="Scroll Mainnet" title="Scroll Mainnet" />
    }
    @else {
        <img src="/icons/scroll-sepolia.png" width="24" height="24" alt="Unsupported" title="Unsupported" />
    }
</a>
